<script>
// =====================================================================
// SUPABASE — conexão com o banco de dados
// =====================================================================
const SUPA_URL = 'https://yuhlhsnywzsdwskcfpmb.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1aGxoc255d3pzZHdza2NmcG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTkxMzAsImV4cCI6MjA5MDQ3NTEzMH0.NGwso0Ra0XzhsQ7lhpyRPuAND6eJW3A7rErVowN48mw';

async function supaFetch(path) {
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    headers: {
      apikey: SUPA_KEY,
      Authorization: 'Bearer ' + SUPA_KEY,
      Prefer: 'count=none'
    }
  });
  if (!res.ok) throw new Error('Supabase error: ' + res.status);
  return res.json();
}

// Busca paginada para tabelas grandes (mais de 1000 linhas)
async function supaFetchAll(table, pageSize = 1000) {
  let all = [];
  let offset = 0;
  while (true) {
    const rows = await supaFetch(`${table}?select=*&limit=${pageSize}&offset=${offset}`);
    all = all.concat(rows);
    if (rows.length < pageSize) break;
    offset += pageSize;
  }
  return all;
}

async function loadDB() {
  try {
    const [
      qvvRows, varRows, pnRows, bmRows, qwRows,
      qvvVars, qvvQws, varPNs, bmVars, qwMods,
      bomItems, qvvBom
    ] = await Promise.all([
      supaFetch('qvv?select=*'),
      supaFetch('variants?select=*'),
      supaFetch('part_numbers?select=*'),
      supaFetch('bm?select=*'),
      supaFetch('qw?select=*'),
      supaFetch('qvv_variants?select=*'),
      supaFetch('qvv_qws?select=*'),
      supaFetch('variant_part_numbers?select=*'),
      supaFetch('bm_variants?select=*'),
      supaFetch('qw_modifications?select=*'),
      supaFetchAll('bom_items'),
      supaFetchAll('qvv_bom')
    ]);

    const DB = { qvv: {}, variants: {}, partNumbers: {}, bm: {}, qws: {}, bomItems: {} };

    qvvRows.forEach(r => {
      DB.qvv[r.id] = {
        type: 'QVV', name: r.id, plant: r.plant,
        description: r.description,
        validFrom: r.valid_from, validUntil: r.valid_until,
        classification: r.classification,
        variants: [], qws: [],
        bomByGroup: {}   // local_field → [ {id, description, qty, acqTyp, classification} ]
      };
    });

    varRows.forEach(r => {
      DB.variants[r.id] = {
        type: 'Variante', name: r.id,
        description: r.description,
        validFrom: r.valid_from, validUntil: r.valid_until,
        classification: r.classification,
        partNumbers: [], qws: []
      };
    });

    pnRows.forEach(r => {
      DB.partNumbers[r.id] = {
        type: 'Part Number', name: r.id,
        description: r.description,
        validFrom: r.valid_from, validUntil: r.valid_until,
        classification: r.classification,
        usedBy: []
      };
    });

    bmRows.forEach(r => {
      DB.bm[r.id] = {
        type: 'BM', name: r.id,
        description: r.description,
        validFrom: r.valid_from, validUntil: r.valid_until,
        classification: r.classification,
        usedBy: []
      };
    });

    qwRows.forEach(r => {
      DB.qws[r.id] = {
        type: 'QW', name: r.id,
        validFrom: r.valid_from, validUntil: r.valid_until,
        classification: r.classification,
        appliedTo: [], modifications: []
      };
    });

    // BoM items (Z numbers)
    bomItems.forEach(r => {
      DB.bomItems[r.id] = {
        type: 'Z', name: r.id,
        description: r.description,
        sptc: r.sptc,
        classification: r.classification,
        profit_center: r.profit_center
      };
    });

    // Relacionamentos existentes
    qvvVars.forEach(r => DB.qvv[r.qvv_id]?.variants.push(r.variant_id));
    qvvQws.forEach(r  => {
      DB.qvv[r.qvv_id]?.qws.push(r.qw_id);
      DB.qws[r.qw_id]?.appliedTo.push(r.qvv_id);
    });
    varPNs.forEach(r  => {
      DB.variants[r.variant_id]?.partNumbers.push(r.part_number_id);
      DB.partNumbers[r.part_number_id]?.usedBy.push(r.variant_id);
    });
    bmVars.forEach(r  => DB.bm[r.bm_id]?.usedBy.push(r.variant_id));
    qwMods.forEach(r  => DB.qws[r.qw_id]?.modifications.push({ part: r.part, sign: r.sign }));

    // QVV → BoM items agrupados por local_field (A, C, G, H, I, K, M…)
    qvvBom.forEach(r => {
      const qvv = DB.qvv[r.qvv_id];
      if (!qvv) return;
      const group = r.local_field || 'Geral';
      if (!qvv.bomByGroup[group]) qvv.bomByGroup[group] = [];
      const item = DB.bomItems[r.item_id];
      qvv.bomByGroup[group].push({
        id:             r.item_id,
        description:    item ? item.description : '',
        quantity:       r.quantity,
        acqTyp:         r.acq_typ,
        classification: item ? item.classification : ''
      });
    });

    return DB;

  } catch (err) {
    console.error('Erro ao carregar dados:', err);
    showLoadError();
    return null;
  }
}

function showLoadError() {
  const notice = document.getElementById('searchNotice');
  if (notice) notice.textContent = '⚠ Erro ao conectar com o banco de dados.';
}

// DB começa vazio — preenchido pelo loadDB()
let DB = { qvv: {}, variants: {}, partNumbers: {}, bm: {}, qws: {} };

// =====================================================================
// HISTORY — cada entrada guarda o resultado renderizado completo
// =====================================================================
const history = [];   // [ { result, category, planta } ]

function pushHistory(result, category, planta) {
  history.push({ result, category, planta });
}

function goBack() {
  if (history.length > 0) {
    const prev = history.pop();
    renderDetail(prev.result, prev.category, prev.planta, false); // false = não empurra no histórico
  } else {
    navigateTo('screen-home');
  }
}

// =====================================================================
// WHEEL
// =====================================================================
const PLANTS  = ['SBC', 'CPS', 'ITU'];
const ITEM_H  = 48;  // must match --item-h in CSS
const PADDING = 1;   // 1 row above and below the visible selection

let plantIndex = 0;
let wDragging = false, wStartY = 0, wStartIdx = 0;

const wList   = document.getElementById('wheelList');
const wTrack  = document.getElementById('wheelTrack');
const wLabel  = document.getElementById('wheelLabel');

function buildWheel() {
  wList.innerHTML = '';
  // 1 padding row on top
  const top = document.createElement('div');
  top.className = 'wheel-item';
  wList.appendChild(top);
  // real items
  PLANTS.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'wheel-item' + (i === plantIndex ? ' active' : '');
    d.textContent = p;
    d.dataset.idx = i;
    wList.appendChild(d);
  });
  // 1 padding row on bottom
  const bot = document.createElement('div');
  bot.className = 'wheel-item';
  wList.appendChild(bot);

  applyWheelOffset(plantIndex, true);
}

function applyWheelOffset(idx, instant) {
  // offset so the selected item sits in the middle row (row index 1)
  const y = -(idx * ITEM_H);   // each increment shifts list up by ITEM_H
  wList.style.transition = instant ? 'none' : 'transform 0.28s cubic-bezier(0.4,0,0.2,1)';
  wList.style.transform  = `translateY(${y}px)`;
  updateWheelSelected();
}

function updateWheelSelected() {
  wList.querySelectorAll('.wheel-item').forEach(el => {
    const i = parseInt(el.dataset.idx);
    el.classList.toggle('active', !isNaN(i) && i === plantIndex);
  });
  wLabel.textContent = PLANTS[plantIndex];
}

function nudgeWheel(dir) {
  plantIndex = (plantIndex + dir + PLANTS.length) % PLANTS.length;
  applyWheelOffset(plantIndex, false);
}

document.getElementById('wheel-up').addEventListener('click',   () => nudgeWheel(-1));
document.getElementById('wheel-down').addEventListener('click', () => nudgeWheel(1));

wTrack.addEventListener('mousedown', e => {
  wDragging = true; wStartY = e.clientY; wStartIdx = plantIndex;
  wList.style.transition = 'none';
});
window.addEventListener('mousemove', e => {
  if (!wDragging) return;
  const moved = Math.round(-(e.clientY - wStartY) / ITEM_H);
  const ni = Math.max(0, Math.min(PLANTS.length - 1, wStartIdx + moved));
  if (ni !== plantIndex) { plantIndex = ni; applyWheelOffset(plantIndex, true); }
});
window.addEventListener('mouseup', () => {
  if (!wDragging) return; wDragging = false; applyWheelOffset(plantIndex, false);
});
wTrack.addEventListener('touchstart', e => {
  wStartY = e.touches[0].clientY; wStartIdx = plantIndex;
}, { passive: true });
wTrack.addEventListener('touchmove', e => {
  const moved = Math.round(-(e.touches[0].clientY - wStartY) / ITEM_H);
  const ni = Math.max(0, Math.min(PLANTS.length - 1, wStartIdx + moved));
  if (ni !== plantIndex) { plantIndex = ni; applyWheelOffset(plantIndex, true); }
}, { passive: true });
wTrack.addEventListener('touchend', () => applyWheelOffset(plantIndex, false));
wTrack.addEventListener('wheel', e => {
  e.preventDefault(); nudgeWheel(e.deltaY > 0 ? 1 : -1);
}, { passive: false });

buildWheel();

// =====================================================================
// NAVIGATION
// =====================================================================
function navigateTo(screenId) {
  const bar = document.getElementById('loadingBar');
  bar.classList.add('active');
  setTimeout(() => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active','exit-left'));
    document.getElementById(screenId).classList.add('active');
    document.getElementById(screenId).scrollTop = 0;
    bar.classList.remove('active');
  }, 300);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// =====================================================================
// TABS
// =====================================================================
// Mapa de categoria → id da aba
const CATEGORY_TAB = {
  qvv:     'qvv',
  variant: 'x',      // variantes X ficam na aba X; outras ficam em 'outros'
  pn:      'outros',
  bm:      'bm',
  qw:      'qw'
};

function categoryToTab(category, result) {
  if (category === 'variant') {
    return result.name.startsWith('X') ? 'x' : 'outros';
  }
  return CATEGORY_TAB[category] || 'outros';
}

function switchTab(id) {
  document.querySelectorAll('#tabsBar .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
}

function arrowSVG() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
}

function makeResultCard(result, category) {
  // Card de resultado único — clicável para abrir o detalhe
  const sub = result.description || result.type;
  return `
    <div class="item-card" onclick="goToDetail('${result.name}')">
      <div>
        <div class="item-card-name">${result.name}</div>
        <div class="item-card-sub">${sub}</div>
      </div>
      <div class="item-card-arrow">${arrowSVG()}</div>
    </div>`;
}

// Popula a aba correta com o resultado da busca e ativa essa aba
function showResultInTab(result, category) {
  const tabId  = categoryToTab(category, result);
  const panel  = document.getElementById('panel-' + tabId);

  panel.innerHTML =
    `<div style="font-size:0.6rem;letter-spacing:0.26em;text-transform:uppercase;
                 color:var(--mb-silver);margin-bottom:10px">Resultado da busca</div>
     <div class="item-list">${makeResultCard(result, category)}</div>`;

  switchTab(tabId);
}

// =====================================================================
// SEARCH
// =====================================================================
function clearDates() {
  document.getElementById('inp-date-from').value = '';
  document.getElementById('inp-date-to').value   = '';
}

function getDateFilters() {
  const from = document.getElementById('inp-date-from').value;  // 'YYYY-MM-DD' or ''
  const to   = document.getElementById('inp-date-to').value;
  return { from, to };
}

function passesDateFilter(result, from, to) {
  if (!from && !to) return true;
  // validFrom and validUntil are 'YYYY-MM-DD' strings
  const vf = result.validFrom || '';
  const vu = result.validUntil || '';
  if (from && vu && vu < from) return false;  // item expired before filter start
  if (to   && vf && vf > to)   return false;  // item started after filter end
  return true;
}

function handleSubmit() {
  const raw    = document.getElementById('inp-search').value.trim();
  const notice = document.getElementById('searchNotice');
  if (!raw) { notice.textContent = '⚠ Digite um termo de busca.'; return; }
  notice.textContent = '';
  const query = raw.toUpperCase();

  // Wildcard search: ends with *
  if (query.endsWith('*')) {
    handleWildcard(query.slice(0, -1));
    return;
  }

  openItem(query);
}

function handleWildcard(prefix) {
  const { from, to } = getDateFilters();
  const sources = [
    { map: DB.qvv,         cat: 'qvv' },
    { map: DB.variants,    cat: 'variant' },
    { map: DB.partNumbers, cat: 'pn' },
    { map: DB.bm,          cat: 'bm' },
    { map: DB.qws,         cat: 'qw' }
  ];

  // Collect all matches grouped by category-tab
  const byTab = {};

  sources.forEach(({ map, cat }) => {
    Object.values(map).forEach(item => {
      if (!item.name.startsWith(prefix)) return;
      if (!passesDateFilter(item, from, to)) return;
      const tabId = categoryToTab(cat, item);
      if (!byTab[tabId]) byTab[tabId] = [];
      byTab[tabId].push({ item, cat });
    });
  });

  const totalFound = Object.values(byTab).reduce((s, arr) => s + arr.length, 0);

  if (totalFound === 0) {
    toast('Nenhum resultado encontrado para "' + prefix + '*".');
    return;
  }

  // Populate each tab that has results
  let firstTab = null;
  Object.entries(byTab).forEach(([tabId, entries]) => {
    const panel = document.getElementById('panel-' + tabId);
    panel.innerHTML =
      `<div style="font-size:0.6rem;letter-spacing:0.26em;text-transform:uppercase;
                   color:var(--mb-silver);margin-bottom:10px">${entries.length} resultado(s) para "${prefix}*"</div>
       <div class="item-list">
         ${entries.map(({ item, cat }) => makeResultCard(item, cat)).join('')}
       </div>`;
    if (!firstTab) firstTab = tabId;
  });

  // Clear tabs that didn't match
  ['qvv','x','bm','qw','outros'].forEach(tabId => {
    if (!byTab[tabId]) {
      document.getElementById('panel-' + tabId).innerHTML = '';
    }
  });

  switchTab(firstTab);
}

document.getElementById('inp-search').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSubmit();
});

function findItem(key) {
  if (DB.qvv[key])         return { result: DB.qvv[key],        category: 'qvv' };
  if (DB.variants[key])    return { result: DB.variants[key],    category: 'variant' };
  if (DB.partNumbers[key]) return { result: DB.partNumbers[key], category: 'pn' };
  if (DB.bm[key])          return { result: DB.bm[key],          category: 'bm' };
  if (DB.qws[key])         return { result: DB.qws[key],         category: 'qw' };
  return null;
}

// Chamado pelos cards das abas — abre o detalhe diretamente
function goToDetail(key) {
  const found = findItem(key);
  if (!found) return;
  const { result, category } = found;
  const planta = PLANTS[plantIndex];
  renderDetail(result, category, planta, false);
}

// Chamado pela busca ou por links dentro do detalhe
function openItem(key) {
  const { from, to } = getDateFilters();
  const found = findItem(key);
  if (!found) { toast('Termo não encontrado na base de dados.'); return; }

  const { result, category } = found;
  const planta = PLANTS[plantIndex];

  if (!passesDateFilter(result, from, to)) {
    toast('Item encontrado mas fora do período de validade selecionado.');
    return;
  }

  if (category === 'qvv' && planta !== 'SBC') {
    toast('QVV disponível apenas na planta SBC. Selecione SBC.');
    return;
  }

  const onDetail = document.getElementById('screen-detail').classList.contains('active');

  if (onDetail) {
    pushHistory(currentResult, currentCategory, currentPlanta);
    renderDetail(result, category, planta, false);
  } else {
    showResultInTab(result, category);
  }
}

// =====================================================================
// RENDER DETAIL
// =====================================================================
let currentResult = null, currentCategory = null, currentPlanta = null;

function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${d}.${m}.${y}`;
}

function badge(cls) {
  return `<span class="badge badge-${cls.toLowerCase()}">${cls}</span>`;
}

function renderDetail(result, category, planta, pushToHistory) {
  if (pushToHistory && currentResult) {
    pushHistory(currentResult, currentCategory, currentPlanta);
  }
  currentResult   = result;
  currentCategory = category;
  currentPlanta   = planta;

  document.getElementById('detail-title').textContent = result.name;
  document.getElementById('detail-sub').textContent   = `${result.type} · Planta: ${planta}`;

  const body = document.getElementById('detail-body');
  body.innerHTML = '';

  // ---- General info card ----
  const genCard = el('div', 'card');
  genCard.innerHTML = `
    <div class="card-title">Informações Gerais ${badge(result.classification)}</div>
    <div class="detail-grid">
      <div class="detail-field full">
        <div class="detail-field-label">${result.type}</div>
        <div class="detail-field-value">${result.name}</div>
      </div>
      ${result.description ? `
      <div class="detail-field full">
        <div class="detail-field-label">Descrição</div>
        <div class="detail-field-value">${result.description}</div>
      </div>` : ''}
      <div class="detail-field">
        <div class="detail-field-label">Válido Desde</div>
        <div class="detail-field-value">${fmtDate(result.validFrom)}</div>
      </div>
      <div class="detail-field">
        <div class="detail-field-label">Válido Até</div>
        <div class="detail-field-value">${fmtDate(result.validUntil)}</div>
      </div>
    </div>`;
  body.appendChild(genCard);

  // ---- QVV: variants + QWs + BoM items agrupados por local_field ----
  if (category === 'qvv') {
    if (result.variants && result.variants.length) {
      body.appendChild(divider());
      body.appendChild(variantListCard('Variantes Associadas', result.variants));
    }
    if (result.qws && result.qws.length) {
      body.appendChild(divider());
      body.appendChild(qwCard(result.qws));
    }
    // BoM items agrupados por grupo (local_field)
    if (result.bomByGroup && Object.keys(result.bomByGroup).length) {
      body.appendChild(divider());
      body.appendChild(bomGroupsCard(result.bomByGroup));
    }
  }

  // ---- Variant: part numbers + QWs (from the QVVs that use this variant) ----
  if (category === 'variant') {
    if (result.partNumbers && result.partNumbers.length) {
      body.appendChild(divider());
      body.appendChild(pnListCard(result.partNumbers));
    }
    // QWs that belong to QVVs containing this variant
    const relatedQWs = getQWsForVariant(result.name);
    if (relatedQWs.length) {
      body.appendChild(divider());
      body.appendChild(qwCard(relatedQWs));
    }
  }

  // ---- Part Number: variants that use it ----
  if (category === 'pn') {
    if (result.usedBy && result.usedBy.length) {
      body.appendChild(divider());
      body.appendChild(variantListCard('Variantes que Utilizam', result.usedBy));
    }
  }

  // ---- BM: variants ----
  if (category === 'bm') {
    if (result.usedBy && result.usedBy.length) {
      body.appendChild(divider());
      body.appendChild(variantListCard('Variantes Associadas', result.usedBy));
    }
  }

  // ---- QW: modifications + QVVs it applies to ----
  if (category === 'qw') {
    if (result.modifications && result.modifications.length) {
      body.appendChild(divider());
      const mc = el('div', 'card');
      mc.innerHTML = `<div class="card-title">Modificações (Entrada / Saída)</div>
        <div class="part-list">
          ${result.modifications.map(m => `
            <div class="part-item ${m.sign === '+' ? 'incoming' : 'outgoing'}"
                 onclick="openItem('${m.part}')">
              <span class="part-sign ${m.sign === '+' ? 'plus' : 'minus'}">${m.sign}</span>
              <span>${m.part}</span>
            </div>`).join('')}
        </div>`;
      body.appendChild(mc);
    }
    if (result.appliedTo && result.appliedTo.length) {
      body.appendChild(divider());
      const ac = el('div', 'card');
      ac.innerHTML = `<div class="card-title">Aplicada nos QVVs</div>
        <div class="item-list">
          ${result.appliedTo.map(q => {
            const qd = DB.qvv[q];
            return `<div class="item-card" onclick="openItem('${q}')">
              <div>
                <div class="item-card-name">${q}</div>
                <div class="item-card-sub">${qd ? qd.description : 'QVV'}</div>
              </div>
              <div class="item-card-arrow">${arrowSVG()}</div>
            </div>`;
          }).join('')}
        </div>`;
      body.appendChild(ac);
    }
  }

  navigateTo('screen-detail');
}

// Returns QW names from any QVV that contains this variant
function getQWsForVariant(variantName) {
  const qwNames = new Set();
  Object.values(DB.qvv).forEach(qvv => {
    if (qvv.variants.includes(variantName) && qvv.qws) {
      qvv.qws.forEach(q => qwNames.add(q));
    }
  });
  return [...qwNames];
}

function variantListCard(title, keys) {
  const c = el('div', 'card');
  c.innerHTML = `<div class="card-title">${title}</div>
    <div class="item-list">
      ${keys.map(k => {
        const vd = DB.variants[k];
        return `<div class="item-card" onclick="openItem('${k}')">
          <div>
            <div class="item-card-name">${k}</div>
            <div class="item-card-sub">${vd ? vd.description : 'Variante'}</div>
          </div>
          <div class="item-card-arrow">${arrowSVG()}</div>
        </div>`;
      }).join('')}
    </div>`;
  return c;
}

function pnListCard(pns) {
  const c = el('div', 'card');
  c.innerHTML = `<div class="card-title">Part Numbers</div>
    <div class="part-list">
      ${pns.map(pn => {
        const pd = DB.partNumbers[pn];
        return `<div class="part-item" onclick="openItem('${pn}')">
          <span style="font-weight:600">${pn}</span>
          ${pd ? `<span style="font-size:0.78rem;color:var(--mb-silver)">— ${pd.description}</span>` : ''}
        </div>`;
      }).join('')}
    </div>`;
  return c;
}

function qwCard(qwNames) {
  const c = el('div', 'card');
  let html = `<div class="card-title">QWs — Modificações</div>`;
  qwNames.forEach(name => {
    const qw = DB.qws[name];
    if (!qw) return;
    html += `
      <div style="margin-bottom:18px">
        <div style="font-size:0.82rem;font-weight:700;color:var(--mb-silver);
                    letter-spacing:0.1em;margin-bottom:8px">${name}</div>
        <div class="part-list">
          ${qw.modifications.map(m => `
            <div class="part-item ${m.sign === '+' ? 'incoming' : 'outgoing'}"
                 onclick="openItem('${m.part}')">
              <span class="part-sign ${m.sign === '+' ? 'plus' : 'minus'}">${m.sign}</span>
              <span>${m.part}</span>
            </div>`).join('')}
        </div>
      </div>`;
  });
  c.innerHTML = html;
  return c;
}

function bomGroupsCard(bomByGroup) {
  const c = el('div', 'card');
  let html = '<div class="card-title">BoM — Itens por Grupo</div>';

  const groups = Object.keys(bomByGroup).sort();
  groups.forEach(g => {
    const items = bomByGroup[g];
    const label = 'Grupo ' + g;
    html += `
      <div class="bom-group">
        <div class="bom-group-header" onclick="toggleBomGroup(this)">
          <span class="bom-group-label">${label}</span>
          <span class="bom-group-count">${items.length} itens</span>
          <svg class="bom-group-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="bom-group-body">
          <table class="bom-table">
            <thead>
              <tr>
                <th>Material</th>
                <th>Descrição</th>
                <th>Qtd</th>
                <th>Tipo</th>
                <th>Class.</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(item => `
                <tr>
                  <td class="bom-id">${item.id}</td>
                  <td class="bom-desc">${item.description || '—'}</td>
                  <td class="bom-qty">${item.quantity}</td>
                  <td class="bom-acq">${item.acqTyp || '—'}</td>
                  <td><span class="badge badge-${(item.classification||'u7').toLowerCase()}">${item.classification || '—'}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  });

  c.innerHTML = html;
  return c;
}

function toggleBomGroup(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.bom-group-arrow');
  const open = body.classList.toggle('open');
  arrow.style.transform = open ? 'rotate(180deg)' : '';
}

function el(tag, cls) {
  const d = document.createElement(tag);
  if (cls) d.className = cls;
  return d;
}

function divider() {
  return el('div', 'section-divider');
}

// =====================================================================
// INIT — carrega dados do Supabase e inicializa
// =====================================================================
buildWheel();

// Mostra spinner enquanto carrega
document.getElementById('searchNotice').textContent = 'Carregando dados…';

loadDB().then(data => {
  if (data) {
    DB = data;
    document.getElementById('searchNotice').textContent = '';
  }
});
</script>
